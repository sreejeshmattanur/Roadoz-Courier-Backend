name: Deploy

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy-staging:
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 15.207.220.194
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/Roadoz-Courier-Backend
            git fetch origin staging
            CHANGED=$(git diff HEAD origin/staging -- requirements.txt | wc -l)
            git reset --hard origin/staging
            source venv/bin/activate
            if [ "$CHANGED" -gt "0" ]; then
              echo "requirements.txt changed, running pip install..."
              grep -v "aiomysql" requirements.txt | pip install -r /dev/stdin -q
              python -c "import aiomysql; exit(0 if not aiomysql.__version__.startswith('0.2') else 1)" || pip install "aiomysql @ git+https://github.com/aio-libs/aiomysql.git@1aa9cfcba" --no-deps -q
            else
              echo "requirements.txt unchanged, skipping pip install."
            fi
            echo "Running database migrations..."
            alembic upgrade head
            echo "Running database seeders..."
            python seed_warehouse_role.py
            python seed_franchise_invoice_perm.py
            sudo systemctl restart roadoz
            sudo systemctl is-active roadoz

  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 52.66.93.248
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/Roadoz-Courier-Backend
            git fetch origin main
            CHANGED=$(git diff HEAD origin/main -- requirements.txt | wc -l)
            git reset --hard origin/main
            source venv/bin/activate
            if [ "$CHANGED" -gt "0" ]; then
              echo "requirements.txt changed, running pip install..."
              grep -v "aiomysql" requirements.txt | pip install -r /dev/stdin -q
              python -c "import aiomysql; exit(0 if not aiomysql.__version__.startswith('0.2') else 1)" || pip install "aiomysql @ git+https://github.com/aio-libs/aiomysql.git@1aa9cfcba" --no-deps -q
            else
              echo "requirements.txt unchanged, skipping pip install."
            fi
            echo "Running database migrations..."
            alembic upgrade head
            echo "Running database seeders..."
            python seed_warehouse_role.py
            python seed_franchise_invoice_perm.py
            sudo systemctl restart roadoz
            sudo systemctl is-active roadoz
